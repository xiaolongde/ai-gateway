# AI-Gateway compose stack
# Same file works on:
#   - Windows + Docker Desktop (current dev box)
#   - Linux VPS (M1.6 migration target)
#
# First run:
#   1. Fill .env (POSTGRES_PASSWORD, UI_PASSWORD, etc — see .env.example)
#   2. docker compose build copilot-api
#   3. docker compose run --rm copilot-api copilot-api auth   # GitHub device OAuth
#   4. docker compose up -d
#   5. Open http://127.0.0.1:4000/ui   (login: $UI_USERNAME / $UI_PASSWORD)
#
# Daily:
#   docker compose up -d   /   docker compose down   /   docker compose logs -f litellm

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-gateway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: litellm
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: ai-gateway-litellm
    restart: unless-stopped
    init: true
    tty: true
    stdin_open: true
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://litellm:${POSTGRES_PASSWORD}@postgres:5432/litellm
      STORE_MODEL_IN_DB: "True"
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY required}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:?LITELLM_SALT_KEY required}
      UI_USERNAME: ${UI_USERNAME:-admin}
      UI_PASSWORD: ${UI_PASSWORD:?UI_PASSWORD required for /ui login}
      # Upstream API keys (optional — fill what you have)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # Internal upstreams: copilot-api over compose-network DNS
      COPILOT_API_BASE: http://copilot-api:4141
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
    command: --config /app/config.yaml --port 4000 --host 0.0.0.0
    ports:
      - "4000:4000"
    healthcheck:
      # litellm wolfi-base image has python3 but no wget/curl, so probe via python3
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/readiness',timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 60s

  copilot-api:
    build:
      context: ./docker/copilot-api
    container_name: ai-gateway-copilot-api
    restart: unless-stopped
    environment:
      # Bridge to host's Clash proxy so api.github.com reachable from container
      # On Docker Desktop (Windows/Mac), host.docker.internal points to host
      # On Linux VPS overseas, leave proxy vars blank
      HTTP_PROXY: ${COPILOT_HTTP_PROXY:-}
      HTTPS_PROXY: ${COPILOT_HTTPS_PROXY:-}
      NO_PROXY: localhost,127.0.0.1,postgres,litellm,copilot-api
      NODE_USE_ENV_PROXY: "1"
    volumes:
      # Bind-mount existing host OAuth token so container reuses it
      # (skips device flow; safe since host's bare-metal copilot-api
      # uses the same token). Container's token refresh writes back to
      # host — both stay valid.
      # On VPS where there's no pre-existing token: copy from local
      # before first `up`, OR run `docker compose run --rm copilot-api
      # copilot-api auth` once on VPS to seed.
      - ~/.local/share/copilot-api:/root/.local/share/copilot-api
    ports:
      - "4141:4141"
    extra_hosts:
      # Make host.docker.internal resolvable on Linux too (no-op on Win/Mac)
      - "host.docker.internal:host-gateway"
    healthcheck:
      # wget installed in our copilot-api Dockerfile via apk add wget
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4141/v1/models"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  costpage:
    image: nginx:alpine
    container_name: ai-gateway-costpage
    restart: unless-stopped
    volumes:
      - ./web:/usr/share/nginx/html:ro
    ports:
      - "4002:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/cost.html"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  postgres-data:
