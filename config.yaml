# AI-Gateway - LiteLLM Proxy routing config
# Convention: model_name = client-facing name; litellm_params.model = upstream provider/model

model_list:
  # ====================================================
  # === Direct API providers (need their own API key) ==
  # ====================================================

  # --- Anthropic (need ANTHROPIC_API_KEY) ---
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY

  # --- OpenAI (need OPENAI_API_KEY) ---
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # --- DeepSeek (need DEEPSEEK_API_KEY) ---
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY

  # ====================================================
  # === Subscription wrappers (no per-call charge if  ==
  # === within plan; routed via local copilot-api)    ==
  # ====================================================

  # --- GitHub Copilot Pro via copilot-api on :4141 ---
  # Naming: prefix `copilot/*` makes it clear which upstream is paying
  - model_name: copilot/claude-sonnet-4.6
    litellm_params:
      model: openai/claude-sonnet-4.6
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

  - model_name: copilot/claude-opus-4.7
    litellm_params:
      model: openai/claude-opus-4.7
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

  - model_name: copilot/claude-haiku-4.5
    litellm_params:
      model: openai/claude-haiku-4.5
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

  - model_name: copilot/gpt-5.5
    litellm_params:
      model: openai/gpt-5.5
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

  - model_name: copilot/gpt-5.4
    litellm_params:
      model: openai/gpt-5.4
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

  - model_name: copilot/gpt-5-mini
    litellm_params:
      model: openai/gpt-5-mini
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

  - model_name: copilot/gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

  - model_name: copilot/gemini-2.5-pro
    litellm_params:
      model: openai/gemini-2.5-pro
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

  - model_name: copilot/gemini-3.1-pro-preview
    litellm_params:
      model: openai/gemini-3.1-pro-preview
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

  - model_name: copilot/grok-code-fast-1
    litellm_params:
      model: openai/grok-code-fast-1
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

  # ====================================================
  # === Anthropic-protocol clients (Claude Code etc.) ==
  # === Routes /v1/messages -> copilot-api /v1/messages
  # === No API key needed; pays via Copilot Pro plan.  =
  # ====================================================
  # Naming: kebab-case with -copilot suffix. Use these
  # names when calling /v1/messages (Claude Code).

  - model_name: claude-sonnet-4-6-copilot
    litellm_params:
      model: anthropic/claude-sonnet-4.6
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

  - model_name: claude-sonnet-4-5-copilot
    litellm_params:
      model: anthropic/claude-sonnet-4.5
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

  - model_name: claude-sonnet-4-copilot
    litellm_params:
      model: anthropic/claude-sonnet-4
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

  - model_name: claude-opus-4-7-copilot
    litellm_params:
      model: anthropic/claude-opus-4.7
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

  - model_name: claude-opus-4-5-copilot
    litellm_params:
      model: anthropic/claude-opus-4.5
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

  - model_name: claude-haiku-4-5-copilot
    litellm_params:
      model: anthropic/claude-haiku-4.5
      api_base: os.environ/COPILOT_API_BASE
      api_key: dummy

litellm_settings:
  drop_params: true
  set_verbose: false
  request_timeout: 600

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # M1.5: persist models / virtual keys / spend logs to Postgres so admin UI works.
  # Requires DATABASE_URL env var pointing at running Postgres (see docker-compose.yml).
  # Set to true only when running with Docker Compose (Postgres available).
  store_model_in_db: false
